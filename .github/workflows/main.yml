name: CI

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 2
  HUSKY: 0

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - uses: ./.github/actions/setup

      - run: yarn lint

  size:
    name: Check size
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - uses: ./.github/actions/setup

      - name: Check size
        run: yarn --cwd packages/renderer run size

  test:
    name: Run unit tests (Node.js ${{ matrix.node_version }}; React ${{ matrix.react_version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # We aim to test all maintained LTS versions of Node.js as well as the latest stable version
        node_version: [18, 20, 21]
        react_version: [16, 17, 18]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - uses: ./.github/actions/setup
      - run: mise use node@${{ matrix.node_version }}
      
      - name: Run tests
        run: REACT_VERSION=${{ matrix.react_version }} yarn test

  e2e-node:
    runs-on: ubuntu-latest
    name: Run E2E tests (Node.js ${{ matrix.node_version }}
    strategy:
      matrix:
        node_version: [18, 20, 21]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup
      - run: mise use node@${{ matrix.node_version }}

      - name: Run E2E tests
        run: yarn --cwd e2e/node-esm run start
